# Kompl v2 — docker-compose (commit 4).
#
# Three real services + one placeholder:
#   - app         (Next.js 16 + better-sqlite3 single-writer, commit 2)
#   - nlp-service (FastAPI + Firecrawl + MarkItDown, commit 3)
#   - n8n         (ingest orchestration, Sidecar pattern, commit 3)
#   - wiki        (Docusaurus — placeholder until commit 11)
#
# CRITICAL — architecture rule #1 storage substrate:
#   kompl.db lives on a NAMED DOCKER VOLUME, never a Windows host bind
#   mount. SQLite WAL fcntl locks do not pass through the Docker Desktop
#   for Windows filesystem bridge (9P/SMB) and silently diverge. Verified
#   2026-04-08 — SQLite's own "Appropriate Uses" page still recommends an
#   HTTP-gateway pattern for multi-process access.
#
# Single-writer enforcement:
#   Only `app` writes to kompl.db. nlp-service and n8n share the same
#   `kompl-data` volume for FILE access (raw markdown + uploads) but
#   NEVER open kompl.db directly. The nlp-service does not mount /data/db
#   in a read-write way — it only needs /data/raw/ for uploaded file paths.
#
# Sidecar pattern (CLAUDE.md rule #3):
#   Browser → Next.js (/api/ingest/*) → Next.js → n8n webhook (internal
#   network) → n8n → nlp-service (internal network) → n8n → Next.js
#   (/api/sources/store, internal network). n8n port 5678 is exposed for
#   developer convenience (n8n UI); do NOT expose it this way in prod.
#   See docs/research/2026-04-08-commit-3-architecture.md.

services:
  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DB_PATH: /data/db/kompl.db
      NODE_ENV: production
      # Internal DNS name of the n8n service on the compose network.
      N8N_URL: http://n8n:5678
      # Onboarding v2 prelude health check reads these from process.env to
      # gate compile up-front. Next.js itself makes no Gemini/Firecrawl
      # calls — the downstream work runs inside nlp-service, which has its
      # own copies above. Presence-only check, no SDK import.
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY:-}
    volumes:
      - kompl-data:/data
    depends_on:
      n8n:
        condition: service_healthy
      nlp-service:
        condition: service_healthy
    healthcheck:
      # node is always present in node:20-slim; wget/curl are not.
      # Checks HTTP status only (not JSON body): exits 0 on HTTP 200, exits 1
      # on non-200, socket error, or 3s timeout. Both status:'ok' and
      # status:'degraded' return HTTP 200 — the container stays healthy while
      # NLP is temporarily unreachable. Only status:'error' returns HTTP 500.
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1)).setTimeout(3000,()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.0'

  nlp-service:
    build:
      context: ./nlp-service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY}
      PYTHONUNBUFFERED: "1"
      # Commit 4: LLM compile. google-genai SDK reads GEMINI_API_KEY.
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      # Rate limiter: 800 RPM = 80% of tier-1 cap (1000 RPM). Set lower if on free tier.
      GEMINI_RPM: ${GEMINI_RPM:-800}
      # Input truncation: 128,000 chars ≈ 32,000 tokens (1 token/4 chars).
      GEMINI_INPUT_TOKEN_CAP: ${GEMINI_INPUT_TOKEN_CAP:-128000}
      # Daily $ cost ceiling. nlp-service raises CostCeilingError when exceeded.
      GEMINI_DAILY_USD_CAP: ${GEMINI_DAILY_USD_CAP:-5.00}
    volumes:
      # Shared file access to /data/raw so MarkItDown can read uploads
      # that Next.js wrote. Does NOT include write access to /data/db/kompl.db
      # — rule #1. (Docker compose named volumes are shared read-write by
      # default; the enforcement is at the code layer: nlp-service never
      # opens kompl.db, verified by the absence of sqlite imports in the
      # router files.)
      - kompl-data:/data
    # Dev-only host port so you can curl the conversion routes directly
    # during debugging. Remove in production.
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, sys; urllib.request.urlopen('http://localhost:8000/health', timeout=3).read(); sys.exit(0)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '2.0'

  n8n:
    image: n8nio/n8n:2.15.0
    restart: unless-stopped
    entrypoint: ["/auto-import.sh"]
    environment:
      # Task runner — both timeouts MUST be set explicitly in n8n 2.x
      # because the per-request default dropped from 300s to 60s with
      # the 2.0 task runner changes. See docs/research/2026-04-08-n8n-2x.md.
      N8N_RUNNERS_ENABLED: "true"
      N8N_RUNNERS_TASK_TIMEOUT: "300"
      N8N_RUNNERS_TASK_REQUEST_TIMEOUT: "300"
      # Block Code-node access to process.env so API keys must flow
      # through credentials files (commit 3 does not use Code nodes for
      # any logic, but we set this defensively per rule #3).
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "true"
      # Binary data on the shared volume so nlp-service can read uploads.
      N8N_DEFAULT_BINARY_DATA_MODE: "filesystem"
      GENERIC_TIMEZONE: ${KOMPL_TIMEZONE:-UTC}
      # Pass the Firecrawl key in case future workflows need it via
      # credentials files (commit 3 uses nlp-service for Firecrawl).
      FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY}
    volumes:
      - n8n-data:/home/node/.n8n
      - kompl-data:/data
      - ./n8n/auto-import.sh:/auto-import.sh:ro
      - ./n8n/workflows:/workflows:ro
    # Dev-only: n8n UI accessible on host at 127.0.0.1:5678. Bound to loopback — not internet-accessible. Remove for production.
    ports:
      - "127.0.0.1:5678:5678"
    # n8n exposes /healthz. n8n is a Node.js app so `node` is always present;
    # wget and curl are NOT in the n8n image. Use the same node HTTP pattern as
    # the app healthcheck. Give 90s start_period: auto-import.sh + task runner
    # token handshake can take 60-70s on a cold volume.
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5678/healthz',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1)).setTimeout(3000,()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'

  wiki:
    image: alpine:latest
    # Placeholder — becomes real in commit 11 (Docusaurus static wiki).

volumes:
  kompl-data:
  n8n-data:
