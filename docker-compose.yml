# Kompl v2 — docker-compose (commit 2).
#
# At this commit only the `app` service is real. `nlp-service`, `n8n`, and
# `wiki` remain alpine placeholders; they become real in commits 3 (nlp +
# n8n) and 11 (wiki / Docusaurus).
#
# CRITICAL — architecture rule #1 storage substrate:
#   kompl.db lives on a NAMED DOCKER VOLUME, never a Windows host bind
#   mount. SQLite WAL fcntl locks do not pass through the Docker Desktop
#   for Windows filesystem bridge (9P/SMB) and silently diverge. Verified
#   2026-04-08 — SQLite's own "Appropriate Uses" page still recommends an
#   HTTP-gateway pattern for multi-process access. See CLAUDE.md rule #1.
#
# Single-writer enforcement:
#   Only `app` mounts /data/db for write. Future services (nlp-service,
#   n8n) read the DB exclusively over HTTP via /api/* routes. The
#   migration script runs in-container before Node forks — PID-level
#   single-writer guarantee.

services:
  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    ports:
      - "3000:3000"
    environment:
      DB_PATH: /data/db/kompl.db
      NODE_ENV: production
    volumes:
      - kompl-data:/data
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -q -O - http://localhost:3000/api/health | grep -q '\"status\":\"ok\"' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  nlp-service:
    image: alpine:latest
    # Placeholder — becomes real in commit 3 (Firecrawl + MarkItDown converter).

  n8n:
    image: alpine:latest
    # Placeholder — becomes real in commit 3 (ingest workflow orchestration).

  wiki:
    image: alpine:latest
    # Placeholder — becomes real in commit 11 (Docusaurus static wiki).

volumes:
  kompl-data:
  n8n-data:
