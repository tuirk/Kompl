name: Tests

# Architecture rule #6: the integration test gates every commit from
# commit 2 onward. TODO stages are fine; REAL stages must stay green.
# See scripts/integration-test.sh for the 11-stage harness.
#
# Two jobs run in parallel:
#   - unit-tests: vitest (app, cli) + pytest (nlp-service). Fast (<5 min).
#   - integration-test: full docker compose end-to-end (10-15 min).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests-app:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json
      - run: npm ci
        working-directory: app
      - run: npx vitest run
        working-directory: app

  unit-tests-cli:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cli/package-lock.json
      - run: npm ci
        working-directory: cli
      - run: npm test
        working-directory: cli

  unit-tests-nlp:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # nlp-service requirements include torch + spaCy + sentence-transformers
    # (~2 GB). Heavy ML deps are stubbed in conftest.py so tests never load
    # them — but a small set (google-genai, pyrate-limiter, fastapi, httpx,
    # pytest) IS required at import time. Install full requirements.txt for
    # parity with the integration test environment.
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: nlp-service/requirements.txt
      - run: pip install -r requirements.txt
        working-directory: nlp-service
      - run: python -m pytest
        working-directory: nlp-service

  integration-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Free disk space
        # nlp-service pulls in PyTorch (~800 MB) + ffmpeg/flite. GHA runners
        # ship with Android SDK, .NET, Haskell pre-installed and only ~14 GB
        # free — not enough for a full Docker build + load. Remove the biggest
        # offenders (~12 GB) before building.
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo apt-get clean
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run integration test
        run: bash scripts/integration-test.sh
        env:
          # Commit 2 doesn't need real API keys — stages 2-10 are TODO
          # and stage 1 only exercises DB migration + health check.
          # When stages flip to real in later commits, they will need
          # these values and will be set via GitHub Secrets at that time.
          DB_PATH: /data/db/kompl.db
          # Merge the CI cache override so docker compose build uses the GHA
          # cache backend. First run warms cache; subsequent runs ~2-3 min.
          COMPOSE_FILE: docker-compose.yml:docker-compose.ci.yml
