name: OpenSSF Scorecard

# Manual-trigger only for now. Once GHA billing is restored, restore the
# scheduled + push triggers below by removing the `workflow_dispatch:`-only
# block and uncommenting the original triggers. See docs/Tui-read.me for
# the deferral note.

on:
  workflow_dispatch:
  # branch_protection_rule:
  # schedule:
  #   - cron: '23 1 * * 1'  # weekly Monday 01:23 UTC
  # push:
  #   branches: [main]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # for github/codeql-action/upload-sarif
      id-token: write          # for sigstore keyless signing of results
      contents: read
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a  # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code scanning
        uses: github/codeql-action/upload-sarif@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a  # v3
        with:
          sarif_file: results.sarif
