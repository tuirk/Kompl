name: OpenSSF Scorecard

# `publish_results: true` (in the analysis step) pushes the run output to
# OSSF's central server, which feeds the api.scorecard.dev badge in README.md.
# Without at least one published run the badge renders "invalid repo path".

on:
  branch_protection_rule:
  schedule:
    - cron: '23 1 * * 1'  # weekly Monday 01:23 UTC
  push:
    branches: [main]
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # for github/codeql-action/upload-sarif
      id-token: write          # for sigstore keyless signing of results
      contents: read
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a  # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code scanning
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a  # v4.36.3
        with:
          sarif_file: results.sarif
